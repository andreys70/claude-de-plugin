## Schema → Job Type Registry
## Self-contained in the pii-minimization plugin — no external file reference needed.
## Used by phase1.md, phase2.md, and redshift-widen.md to dispatch to the correct agent.
##
## PII Inventory Google Sheet (authoritative source for SENSITIVE columns and pipeline metadata):
##   Base URL: https://docs.google.com/spreadsheets/d/1tRCokJ8n__Juw4IG3tI1LfmybxN25y1d/edit
##
##   Tabs:
##     gid=2018349118  — 📋 Execution Overview        (rollout plan, dates, schema counts)
##     gid=1687383891  — 📊 Table-Level PII Detail     (SENSITIVE columns per schema.table — PRIMARY SOURCE)
##     gid=0           — redshift-datalake mapping     (DL→RS schema/table/column name mapping)
##     gid=1716830622  — BPP Prf jobs                  (PRF pipeline names + pipeline_devportal_url)
##     gid=769537233   — BPP Prod pipelines            (PRD pipeline names + pipeline_devportal_url)
##     gid=<N>         — 📋 Table Action Summary       (per-table action: ENCRYPT/DROP)
##     gid=<N>         — 🔐 Schema Encryption Tracker  (per-schema Phase 1/2 deploy status)
##     gid=<N>         — 🔓 Decryption Tracker         (consumer decrypt deploy status)
##     gid=<N>         — 🎯 Milestones & Risks         (key dates and risk log)
##     gid=<N>         — 📅 Non-Working Days           (holidays excluded from scheduling)
##     gid=<N>         — 📢 Communication Plan         (customer comms schedule)
##
## Agents MUST use gid=1687383891 to look up SENSITIVE columns — never hardcode or guess.
##
## pipeline values:
##   rda_bpp          → RDA-framework BPP job (PySpark on EMR)
##   quicketl         → QuickETL-framework BPP job (YAML config + Hive DDL)
##   spp              → SPP platform stream processor (Kafka consumer)
##   report_requestor → Pure Python scripts (Redshift / application-level decrypt)
##   quickbase        → Aurora RDA extract job + QuickETL transform job (composite)
##
## github_repo: full GitHub URL of the repo the agent searches to find pipelines and create PRs against.
##   Format: https://github.intuit.com/<org>/<repo>
##   The agent extracts the owner/repo portion and uses GitHub MCP search_code scoped to that repo.
##   job_path has been removed; the agent discovers job files within the repo via search_code.
##
## DROP-TABLE schemas are listed at the bottom — no Phase 1 or Phase 2 work needed.

